project:
  name: <FILLED_BY_PIPELINE>
  corePackage: SERIOUS

services:
  - hostname: app
    type: bun@1.2
    enableSubdomainAccess: true
    envSecrets:
      CORE_MODE: serious
    minContainers: 2
    maxContainers: 6
    verticalAutoscaling:
      cpuMode: DEDICATED
      minRam: 1
      minFreeRamGB: 0.5

  - hostname: worker
    type: python@3.12
    minContainers: 2
    maxContainers: 6
    verticalAutoscaling:
      cpuMode: DEDICATED
      minRam: 1
      minFreeRamGB: 0.5

  - hostname: db
    type: postgresql@17
    mode: HA
    priority: 10
    verticalAutoscaling:
      cpuMode: DEDICATED
      minRam: 2
      minFreeRamGB: 1

  - hostname: redis
    type: valkey@7.2
    mode: HA
    priority: 10

  - hostname: queue
    type: nats@2.12
    mode: HA
    priority: 10

  - hostname: storage
    type: object-storage
    objectStorageSize: 10
    objectStoragePolicy: public-read
    priority: 10
