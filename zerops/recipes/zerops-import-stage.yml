project:
  name: <FILLED_BY_PIPELINE>

services:
  - hostname: app
    type: bun@1.2
    enableSubdomainAccess: true
    envSecrets:
      CORE_MODE: serious
    verticalAutoscaling:
      minRam: 0.5
      minFreeRamGB: 0.25

  - hostname: worker
    type: python@3.12
    verticalAutoscaling:
      minRam: 0.5

  - hostname: db
    type: postgresql@17
    mode: NON_HA
    priority: 10

  - hostname: redis
    type: valkey@7.2
    mode: NON_HA
    priority: 10

  - hostname: queue
    type: nats@2.12
    mode: NON_HA
    priority: 10

  - hostname: storage
    type: object-storage
    objectStorageSize: 2
    objectStoragePolicy: public-read
    priority: 10
