# Zerops Showcase — CI/CD Pipeline
# Copy this file to .github/workflows/deploy.yml in the deployment orchestration repo.
#
# Manages 4 environment tiers:
#   production  — push to main / tag v*         → showcase-prod       (permanent)
#   stage       — MR merged into stage          → showcase-stage      (permanent)
#   MR staging  — MR opened/updated → stage     → showcase-mr-{N}     (ephemeral)
#   dev         — push to feature branch        → showcase-dev-{slug} (ephemeral)
#
# Required secrets: ZEROPS_TOKEN, ZEROPS_CLIENT_ID
# Optional secrets: REPO_TOKEN (PAT with repo read, if service repos are private)

name: Deploy to Zerops

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - stage
  delete:

env:
  ZEROPS_API_BASE: https://api.app-prg1.zerops.io/api/rest/public
  APP_REPO: zerops-recipe-apps/showcase-recipe-app
  WORKER_REPO: zerops-recipe-apps/showcase-recipe-worker
  APP_SERVICE_NAME: app
  WORKER_SERVICE_NAME: worker
  ZEROPS_YAML_SETUP: prod

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Deploy dev environment (push to feature branch)
  # --------------------------------------------------------------------------
  deploy-dev:
    if: >-
      github.event_name == 'push'
      && !startsWith(github.ref, 'refs/tags/')
      && github.ref != 'refs/heads/main'
      && github.ref != 'refs/heads/stage'
    runs-on: ubuntu-latest
    concurrency:
      group: zerops-dev-${{ github.ref }}
      cancel-in-progress: true
    env:
      ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
      ZEROPS_CLIENT_ID: ${{ secrets.ZEROPS_CLIENT_ID }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          path: app
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Checkout worker repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKER_REPO }}
          path: worker
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Deploy to dev
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          source zerops/scripts/zerops-api.sh

          BRANCH_SLUG=$(slugify "${{ github.ref_name }}")
          PROJECT_NAME="showcase-dev-${BRANCH_SLUG}"
          echo "Project: ${PROJECT_NAME}"

          zerops_ensure_project "$ZEROPS_CLIENT_ID" "$PROJECT_NAME" \
            zerops/recipes/zerops-import-dev.yml 300

          zerops_find_service "$PROJECT_ID" "$APP_SERVICE_NAME"
          zerops_deploy_service "$SERVICE_FOUND_ID" ./app ./app/zerops.yml "$ZEROPS_YAML_SETUP"

          zerops_find_service "$PROJECT_ID" "$WORKER_SERVICE_NAME"
          zerops_deploy_service "$SERVICE_FOUND_ID" ./worker ./worker/zerops.yml "$ZEROPS_YAML_SETUP"

          zerops_get_subdomain_url "$PROJECT_ID" "$APP_SERVICE_NAME"
          {
            echo "### Deployed to Zerops (dev)"
            echo ""
            echo "**Project:** \`${PROJECT_NAME}\`"
            if [[ -n "$SUBDOMAIN_URL" ]]; then
              echo "**URL:** ${SUBDOMAIN_URL}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # Job 2: Deploy production (push to main or tag v*)
  # --------------------------------------------------------------------------
  deploy-prod:
    if: >-
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    concurrency:
      group: zerops-prod
      cancel-in-progress: false
    env:
      ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
      ZEROPS_CLIENT_ID: ${{ secrets.ZEROPS_CLIENT_ID }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          path: app
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Checkout worker repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKER_REPO }}
          path: worker
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Deploy to production
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          source zerops/scripts/zerops-api.sh

          PROJECT_NAME="showcase-prod"
          echo "Project: ${PROJECT_NAME}"

          zerops_ensure_project "$ZEROPS_CLIENT_ID" "$PROJECT_NAME" \
            zerops/recipes/zerops-import-prod.yml 300

          zerops_find_service "$PROJECT_ID" "$APP_SERVICE_NAME"
          zerops_deploy_service "$SERVICE_FOUND_ID" ./app ./app/zerops.yml "$ZEROPS_YAML_SETUP"

          zerops_find_service "$PROJECT_ID" "$WORKER_SERVICE_NAME"
          zerops_deploy_service "$SERVICE_FOUND_ID" ./worker ./worker/zerops.yml "$ZEROPS_YAML_SETUP"

          zerops_get_subdomain_url "$PROJECT_ID" "$APP_SERVICE_NAME"
          {
            echo "### Deployed to Zerops (production)"
            echo ""
            echo "**Project:** \`${PROJECT_NAME}\`"
            if [[ -n "$SUBDOMAIN_URL" ]]; then
              echo "**URL:** ${SUBDOMAIN_URL}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # Job 3: Deploy MR staging (PR opened or updated targeting stage)
  # --------------------------------------------------------------------------
  deploy-mr-staging:
    if: >-
      github.event_name == 'pull_request'
      && github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: zerops-mr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
      ZEROPS_CLIENT_ID: ${{ secrets.ZEROPS_CLIENT_ID }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          path: app
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Checkout worker repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKER_REPO }}
          path: worker
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Deploy MR staging
        id: deploy
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          source zerops/scripts/zerops-api.sh

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PROJECT_NAME="showcase-mr-${PR_NUMBER}"
          echo "Project: ${PROJECT_NAME}"

          zerops_ensure_project "$ZEROPS_CLIENT_ID" "$PROJECT_NAME" \
            zerops/recipes/zerops-import-stage.yml 300

          zerops_find_service "$PROJECT_ID" "$APP_SERVICE_NAME"
          zerops_deploy_service "$SERVICE_FOUND_ID" ./app ./app/zerops.yml "$ZEROPS_YAML_SETUP"

          zerops_find_service "$PROJECT_ID" "$WORKER_SERVICE_NAME"
          zerops_deploy_service "$SERVICE_FOUND_ID" ./worker ./worker/zerops.yml "$ZEROPS_YAML_SETUP"

          zerops_get_subdomain_url "$PROJECT_ID" "$APP_SERVICE_NAME"
          echo "subdomain_url=${SUBDOMAIN_URL}" >> "$GITHUB_OUTPUT"

          {
            echo "### Deployed to Zerops (MR staging)"
            echo ""
            echo "**Project:** \`${PROJECT_NAME}\`"
            if [[ -n "$SUBDOMAIN_URL" ]]; then
              echo "**URL:** ${SUBDOMAIN_URL}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR with deploy URL
        if: steps.deploy.outputs.subdomain_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.subdomain_url }}';
            const marker = '<!-- zerops-mr-staging -->';
            const body = `${marker}\n### Zerops MR Staging\n\n**Preview URL:** ${url}\n\n_Deployed from commit \`${{ github.event.pull_request.head.sha }}\`_`;

            // Find existing comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # --------------------------------------------------------------------------
  # Job 4: Deploy stage (MR merged into stage)
  # --------------------------------------------------------------------------
  deploy-stage:
    if: >-
      github.event_name == 'pull_request'
      && github.event.action == 'closed'
      && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    concurrency:
      group: zerops-stage
      cancel-in-progress: false
    env:
      ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
      ZEROPS_CLIENT_ID: ${{ secrets.ZEROPS_CLIENT_ID }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          path: app
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Checkout worker repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKER_REPO }}
          path: worker
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Deploy to stage
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          source zerops/scripts/zerops-api.sh

          PROJECT_NAME="showcase-stage"
          echo "Project: ${PROJECT_NAME}"

          zerops_ensure_project "$ZEROPS_CLIENT_ID" "$PROJECT_NAME" \
            zerops/recipes/zerops-import-stage.yml 300

          zerops_find_service "$PROJECT_ID" "$APP_SERVICE_NAME"
          zerops_deploy_service "$SERVICE_FOUND_ID" ./app ./app/zerops.yml "$ZEROPS_YAML_SETUP"

          zerops_find_service "$PROJECT_ID" "$WORKER_SERVICE_NAME"
          zerops_deploy_service "$SERVICE_FOUND_ID" ./worker ./worker/zerops.yml "$ZEROPS_YAML_SETUP"

          zerops_get_subdomain_url "$PROJECT_ID" "$APP_SERVICE_NAME"
          {
            echo "### Deployed to Zerops (stage)"
            echo ""
            echo "**Project:** \`showcase-stage\`"
            if [[ -n "$SUBDOMAIN_URL" ]]; then
              echo "**URL:** ${SUBDOMAIN_URL}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # Job 5: Cleanup MR staging (PR closed — merged or rejected)
  # --------------------------------------------------------------------------
  cleanup-mr:
    needs: [deploy-stage]
    if: >-
      always()
      && github.event_name == 'pull_request'
      && github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: zerops-mr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    env:
      ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
      ZEROPS_CLIENT_ID: ${{ secrets.ZEROPS_CLIENT_ID }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Delete MR staging project
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          source zerops/scripts/zerops-api.sh

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PROJECT_NAME="showcase-mr-${PR_NUMBER}"

          echo "Cleaning up MR staging project: ${PROJECT_NAME}"
          zerops_delete_project_by_name "$ZEROPS_CLIENT_ID" "$PROJECT_NAME"

  # --------------------------------------------------------------------------
  # Job 6: Cleanup dev environment (branch deleted)
  # --------------------------------------------------------------------------
  cleanup-dev:
    if: >-
      github.event_name == 'delete'
      && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    env:
      ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
      ZEROPS_CLIENT_ID: ${{ secrets.ZEROPS_CLIENT_ID }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Delete dev project
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          source zerops/scripts/zerops-api.sh

          # github.event.ref on delete event is the branch name (no refs/heads/ prefix)
          BRANCH_SLUG=$(slugify "${{ github.event.ref }}")
          PROJECT_NAME="showcase-dev-${BRANCH_SLUG}"

          echo "Cleaning up dev project: ${PROJECT_NAME}"
          zerops_delete_project_by_name "$ZEROPS_CLIENT_ID" "$PROJECT_NAME"
